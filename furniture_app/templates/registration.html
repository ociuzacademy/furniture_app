{% extends "index.html" %}
{% block content %}

<style>
body {
    background-color: #f4f6f9;
}

.register-container {
    width: 450px;
    margin: 50px auto;
    padding: 30px;
    background-color: #ffffff;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.register-container h2 {
    text-align: center;
    margin-bottom: 25px;
}

.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    font-weight: 600;
    margin-bottom: 6px;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.form-group textarea {
    resize: none;
    height: 80px;
}

.password-wrapper {
    position: relative;
}

.password-wrapper input {
    padding-right: 60px;
}

.toggle-password {
    position: absolute;
    right: 10px;
    top: 10px;
    cursor: pointer;
    font-size: 13px;
    color: #007bff;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    background-color: #007bff;
    color: white;
    font-size: 15px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #0056b3;
}
</style>

<div class="register-container">
    <h2>User Registration</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="number" pattern="[0-9]{10}" required>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="address" required></textarea>
        </div>

        <div class="form-group password-wrapper">
            <label>Password</label>
            <input type="password" id="password" name="password" minlength="6" required>
            <span class="toggle-password" onclick="togglePassword('password', this)">Show</span>
        </div>

        <div class="form-group password-wrapper">
            <label>Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
            <span class="toggle-password" onclick="togglePassword('confirm_password', this)">Show</span>
        </div>

        <div class="form-group">
            <label>Profile Picture</label>
            <input type="file" name="profile_picture">
        </div>

        <button type="submit">Register</button>
    </form>
</div>

<script>
function togglePassword(fieldId, element) {
    var passwordField = document.getElementById(fieldId);

    if (passwordField.type === "password") {
        passwordField.type = "text";
        element.textContent = "Hide";
    } else {
        passwordField.type = "password";
        element.textContent = "Show";
    }
}
</script>

{% endblock %}
