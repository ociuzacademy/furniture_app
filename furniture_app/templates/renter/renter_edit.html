{% extends 'renter/renter_index.html' %}
{% block content %}

<div class="container py-5">
    <div class="text-center mb-4">
        <h2 class="text-primary">Edit Profile</h2>
    </div>

    {% for message in messages %}
        <div class="alert alert-info">{{ message }}</div>
    {% endfor %}

    <div class="row justify-content-center">
        <div class="col-md-8">
            <form method="POST" enctype="multipart/form-data" class="shadow p-4 rounded bg-light">
                {% csrf_token %}

                <div class="mb-3">
                    <label>Name</label>
                    <input type="text" name="name" value="{{ renter.name }}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Phone Number</label>
                    <input type="text" name="number" value="{{ renter.number }}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Business Name</label>
                    <input type="text" name="rental_business_name" 
                           value="{{ renter.rental_business_name }}" 
                           class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Business Address</label>
                    <textarea name="rental_address" class="form-control" required>{{ renter.rental_address }}</textarea>
                </div>

                <div class="mb-3">
                    <label>GST Number</label>
                    <input type="text" name="gst_number" 
                           value="{{ renter.gst_number }}" 
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label>License Number</label>
                    <input type="text" name="license_number" 
                           value="{{ renter.license_number }}" 
                           class="form-control">
                </div>

                <small class="text-danger">
                    Provide either GST OR License Number
                </small>

                <hr>

                <div class="mb-3">
                    <label>New Password</label>
                    <input type="password" name="password" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Profile Picture</label>
                    <input type="file" name="profile_picture" class="form-control">
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary">
                        Update Profile
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

{% endblock %}
