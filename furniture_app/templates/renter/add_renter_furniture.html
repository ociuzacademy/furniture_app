{% extends 'renter/renter_index.html' %}

{% block content %}
    <!-- Rental Furniture Form Start -->
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-4 text-primary">List Your Furniture for Rent</h1>
            <p class="lead text-muted">Provide details about the furniture you want to offer for rent.</p>
        </div>
        <form action="{% url 'add_renter_furniture' %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-4">
                <label for="name" class="form-label">Furniture Name</label>
                <input type="text" class="form-control form-control-lg" id="name" name="name" required>
            </div>
            <div class="mb-4">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control form-control-lg" id="description" name="description" rows="4" required></textarea>
            </div>
            <div class="col-md-13">
    <label for="category" class="form-label">Category</label>
    <select class="form-control" id="category" name="category" required>
        <option value="">Select Category</option>
        {% for cat in categories %}
            <option value="{{ cat.id }}">{{ cat.name }}</option>
        {% endfor %}
    </select>
</div>

            <div class="mb-4">
                <label for="quantity" class="form-label">Quantity</label>
                <input type="number" class="form-control form-control-lg" id="quantity" name="quantity" required>
            </div>
            <div class="mb-4">
                <label for="price" class="form-label">Rental Price (per day)</label>
                <input type="number" class="form-control form-control-lg" id="price" name="price" required>
            </div>
            <div class="mb-4">
                <label for="image" class="form-label">Upload Image</label>
                <input type="file" class="form-control form-control-lg" id="image" name="image" accept="image/*" required>
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-primary btn-lg">Submit</button>
            </div>
        </form>
    </div>
{% endblock %}
