<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Furniture Kada - Rental Dashboard</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="/static/img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500&family=Roboto:wght@500;700;900&display=swap" rel="stylesheet"> 

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="/static/lib/animate/animate.min.css" rel="stylesheet">
    <link href="/static/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
    <link href="/static/lib/lightbox/css/lightbox.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        body {
            background-color: #fdf5e6; /* Light beige */
        }
        h2 {
            color: #8b4513; /* SaddleBrown */
        }
        .navbar-brand {
            color: #8b4513 !important; /* SaddleBrown */
        }
        .btn-primary {
            background-color: #8b4513; /* SaddleBrown */
            border-color: #8b4513;
        }
        .btn-primary:hover {
            background-color: #a0522d; /* Sienna */
            border-color: #a0522d;
        }
        .btn-secondary {
            background-color: #deb887; /* BurlyWood */
            border-color: #deb887;
        }
        .btn-secondary:hover {
            background-color: #d2b48c; /* Tan */
            border-color: #d2b48c;
        }
        label {
            color: #8b4513; /* SaddleBrown */
        }
    </style>
</head>

<body>
      <!-- Navbar Start -->
    <nav class="navbar navbar-expand-lg bg-white navbar-light sticky-top p-0">
        <a href="{% url 'renter_index' %}" class="navbar-brand d-flex align-items-center px-4 px-lg-5">
            <h2 class="m-0 text-primary">Rental Shop - Rentel</h2>
        </a>
        <button type="button" class="navbar-toggler me-4" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <div class="navbar-nav ms-auto p-4 p-lg-0">
                <a href="{% url 'renter_index' %}" class="nav-item nav-link">Home</a>
                <a href="{% url 'add_renter_furniture' %}" class="nav-item nav-link active">add product</a>
                <a href="{% url 'manage_products_renter' %}" class="nav-item nav-link">manage product</a>
                <a href="{% url 'renter_bookings_view' %}" class="nav-item nav-link">Bookings</a>
                <a href="{% url 'renter_profile' %}" class="nav-item nav-link">Profile</a>
            </div>
            <div>
                <a href="{% url 'index' %}" class="btn btn-primary py-4 px-lg-5 d-none d-lg-block">Logout<i class="fa fa-arrow-right ms-3"></i></a>
            </div>
        </div>
    </nav>
    <!-- Navbar End -->
    <div class="container mt-5">
        <h2 class="text-center mb-4">Edit Product</h2>

        <form action="" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label for="product_name">Product Name:</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ product.name|default:'' }}" required>
            </div>
            
            <div class="form-group">
    <label for="category" class="form-label">Category</label>
    <select class="form-control" id="category" name="category" required>
        <option value="">Select Category</option>
        {% for cat in categories %}
            <option value="{{ cat.id }}" {% if product.category.id == cat.id %}selected{% endif %}>
                {{ cat.name }}
            </option>
        {% endfor %}
    </select>
</div>


            <div class="form-group">
                <label for="image">Image:</label>
                {% if product.image %}
                    <img src="{{ product.image.url }}" alt="Product Image" class="img-thumbnail mb-3" width="150">
                {% else %}
                    <p>No image available</p>
                {% endif %}
                <input type="file" class="form-control" id="image" name="image">
            </div>

            <div class="form-group">
                <label for="quantity">Quantity:</label>
                <input type="number" class="form-control" id="quantity" name="quantity" value="{{ product.quantity|default:'' }}" required>
            </div>

            <div class="form-group">
                <label for="price">Price:</label>
                <input type="number" class="form-control" id="price" name="price" value="{{ product.price|default:'' }}">
            </div>

            <div class="form-group">
                <label for="description">Description:</label>
                <textarea class="form-control" id="description" name="description" rows="4" required>{{ product.description|default:'' }}</textarea>
            </div><br>

            <div class="text-center">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{% url 'manage_products_renter' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script> 
</body>
</html>
